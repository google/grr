
@for (result of collectionResults(); track result.name) {
  <table>
    <tr>
      <th>Distro name:</th>
      <td>{{result.name}}</td>
    </tr>
    <tr>
      <th>Release:</th>
      <td>{{result.release}}</td>
    </tr>
    <tr>
      <th>Version:</th>
      <td>{{result.versionMajor}} {{result.versionMinor}}</td>
    </tr>
  </table>
}
