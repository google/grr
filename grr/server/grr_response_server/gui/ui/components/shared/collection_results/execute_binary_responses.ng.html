@for (result of collectionResults(); track result) {
  <codeblock [code]="[`Exit code: ${result.exitStatus}`]" />
  @if (result.stderr.length > 0) {
    <div> Stderr: </div>
    <codeblock [code]="result.stderr" />
  }
  @if (result.stdout.length > 0) {
    <div> Stdout: </div>
    <codeblock [code]="result.stdout" />
  }
}
