
@for (result of collectionResults(); track result; let i = $index) {
  <div class="result">
    <p>
      <strong>cmd:</strong>
      <span class="cmd_{{i}} monospace">{{result.request.cmd}} {{result.request.args.join(" ")}}</span>
    </p>
    <p>
      <strong>exit code:</strong>
      <span class="exit-status_{{i}} monospace">{{result.exitStatus}}</span>
    </p>
    <p>
      <strong>stdout:</strong>
    </p>
    <pre class="stdout_{{i}}">{{result.stdout}}</pre>

      @if (result.stderr) {
      <p>
        <strong>stderr:</strong>
      </p>
      <pre class="stderr_{{i}}">{{result.stderr}}</pre>
    }
  </div>
}
