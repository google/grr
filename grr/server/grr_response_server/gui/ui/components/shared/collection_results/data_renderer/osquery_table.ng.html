
<p class="query">Query:</p>
<codeblock [code]="tableData().query?.split('\n') ?? []" />"

<filter-paginate [dataSource]="dataSource" >
  <table mat-table matSort [dataSource]="dataSource" (matSortChange)="announceSortChange($event)">
    @for (column of displayedColumns(); track column; let i = $index) {
      <ng-container [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{column}}</th>
          <td mat-cell *matCellDef="let row">{{row.values[i]}}</td>
      </ng-container>
    }
    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns();"></tr>

    <tr *matNoDataRow>
      <td>No rows to display.</td>
    </tr>
  </table>
</filter-paginate>
